name: news_api_project
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dartz: ^0.10.1
  equatable: ^2.0.5
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  auto_route: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator: ^10.5.0
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/font/Satoshi-Variable.ttf

  assets:
    - assets/svg/
